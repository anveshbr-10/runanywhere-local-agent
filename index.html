<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F172A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>RunAnywhere AI Starter</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
</head>
<body>
  <div id="root"></div>
  <script>
    window.__bootFallback = function bootFallback() {
      const root = document.getElementById('root');
      if (!root || root.childElementCount > 0) return;
      root.innerHTML = `
        <div style="max-width:760px;margin:48px auto;padding:20px;border-radius:12px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.5;">
          <h2 style="margin:0 0 8px;font-size:22px;">Unable to boot app</h2>
          <p style="margin:0 0 12px;">The browser blocked <code>/src/main.tsx</code> because it was served with the wrong MIME type.</p>
          <p style="margin:0 0 8px;"><strong>Run with Vite:</strong></p>
          <pre style="margin:0;padding:12px;background:#020617;border-radius:8px;overflow:auto;">npm install
npm run dev</pre>
          <p style="margin:12px 0 0;">For production, run <code>npm run build</code> and serve the generated <code>dist/</code> folder (not repository source files).</p>
        </div>
      `;
    };
  </script>
  <script type="module" src="/src/main.tsx" onerror="window.__bootFallback?.()"></script>
</body>
</html>
